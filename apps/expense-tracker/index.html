<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker - Mini App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}
.app-container {
  max-width: 500px;
  margin: 0 auto;
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  overflow: hidden;
}
.header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 30px;
  text-align: center;
}
.header h1 { font-size: 24px; margin-bottom: 10px; }
.balance { font-size: 36px; font-weight: bold; margin: 10px 0; }
.income-expense {
  display: flex;
  justify-content: space-around;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.3);
}
.income-expense div { text-align: center; }
.income-expense .label { font-size: 12px; opacity: 0.9; }
.income-expense .amount { font-size: 20px; font-weight: bold; margin-top: 5px; }
.income { color: #4ade80; }
.expense { color: #f87171; }

.body { padding: 20px; }
.form-section {
  background: #f8fafc;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
}
.form-section h3 { margin-bottom: 15px; color: #1e293b; }
.input-group { margin-bottom: 12px; }
.input-group label { display: block; font-size: 12px; color: #64748b; margin-bottom: 5px; }
.input-group input, .input-group select {
  width: 100%;
  padding: 12px;
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  font-size: 14px;
}
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
.btn-danger {
  background: #ef4444;
  color: white;
  padding: 8px 16px;
  font-size: 12px;
  width: auto;
}

.transactions { margin-top: 20px; }
.transactions h3 { margin-bottom: 15px; color: #1e293b; }
.transaction-list { max-height: 300px; overflow-y: auto; }
.transaction-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px;
  background: #f8fafc;
  border-radius: 12px;
  margin-bottom: 10px;
  border-left: 4px solid;
}
.transaction-item.income { border-left-color: #4ade80; }
.transaction-item.expense { border-left-color: #f87171; }
.transaction-info { flex: 1; }
.transaction-desc { font-weight: 600; color: #1e293b; }
.transaction-category { font-size: 12px; color: #64748b; margin-top: 2px; }
.transaction-amount { font-weight: bold; font-size: 16px; margin-right: 10px; }
.transaction-amount.income { color: #4ade80; }
.transaction-amount.expense { color: #f87171; }

.chart-section {
  background: #f8fafc;
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}
.chart-section h3 { margin-bottom: 15px; color: #1e293b; }
.category-bar {
  margin-bottom: 12px;
}
.category-bar .label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #64748b;
  margin-bottom: 5px;
}
.bar-bg {
  height: 8px;
  background: #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: #94a3b8;
}
.empty-state .icon { font-size: 48px; margin-bottom: 10px; }

.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.modal-overlay.active { display: flex; }
.modal {
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  max-width: 300px;
}
.modal h3 { margin-bottom: 10px; }
.modal p { color: #64748b; margin-bottom: 20px; }
.modal-buttons { display: flex; gap: 10px; }
.modal-buttons .btn { flex: 1; }
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>💰 Expense Tracker</h1>
    <div class="balance" id="balance">$0.00</div>
    <div class="income-expense">
      <div>
        <div class="label">Income</div>
        <div class="amount income" id="totalIncome">+$0.00</div>
      </div>
      <div>
        <div class="label">Expense</div>
        <div class="amount expense" id="totalExpense">-$0.00</div>
      </div>
    </div>
  </div>
  
  <div class="body">
    <div class="form-section">
      <h3>Add Transaction</h3>
      <div class="input-group">
        <label>Description</label>
        <input type="text" id="desc" placeholder="e.g. Grocery shopping">
      </div>
      <div class="input-group">
        <label>Amount</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01">
      </div>
      <div class="input-group">
        <label>Category</label>
        <select id="category">
          <option value="food">🍔 Food & Dining</option>
          <option value="transport">🚗 Transport</option>
          <option value="shopping">🛍️ Shopping</option>
          <option value="entertainment">🎬 Entertainment</option>
          <option value="bills">📱 Bills & Utilities</option>
          <option value="health">💊 Health</option>
          <option value="income">💵 Income</option>
          <option value="other">📦 Other</option>
        </select>
      </div>
      <div class="input-group">
        <label>Type</label>
        <select id="type">
          <option value="expense">Expense (-)</option>
          <option value="income">Income (+)</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="addTransaction()">Add Transaction</button>
    </div>
    
    <div class="chart-section">
      <h3>📊 Spending by Category</h3>
      <div id="categoryChart"></div>
    </div>
    
    <div class="transactions">
      <h3>Recent Transactions</h3>
      <div class="transaction-list" id="transactionList">
        <div class="empty-state">
          <div class="icon">📭</div>
          <p>No transactions yet</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>Delete Transaction?</h3>
    <p>This action cannot be undone.</p>
    <div class="modal-buttons">
      <button class="btn" style="background:#e2e8f0;color:#64748b" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
