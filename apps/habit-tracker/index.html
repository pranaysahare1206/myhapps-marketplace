<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker - Mini App (Premium)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  min-height: 100vh;
  padding: 20px;
}
.app-container {
  max-width: 500px;
  margin: 0 auto;
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  overflow: hidden;
}
.header {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
  padding: 30px;
  text-align: center;
  position: relative;
}
.premium-badge {
  position: absolute;
  top: 15px;
  right: 15px;
  background: #ffd700;
  color: #333;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
}
.header h1 { font-size: 24px; margin-bottom: 5px; }
.streak-display {
  font-size: 48px;
  font-weight: bold;
  margin: 15px 0;
}
.streak-label { font-size: 14px; opacity: 0.9; }

.body { padding: 20px; }

.add-habit-section {
  background: #fdf2f8;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
}
.add-habit-section h3 { margin-bottom: 15px; color: #be185d; }
.input-group { margin-bottom: 12px; }
.input-group label { display: block; font-size: 12px; color: #be185d; margin-bottom: 5px; }
.input-group input, .input-group select {
  width: 100%;
  padding: 12px;
  border: 1px solid #fbcfe8;
  border-radius: 10px;
  font-size: 14px;
}
.color-picker {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.color-option {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: all 0.2s;
}
.color-option.selected { border-color: #333; transform: scale(1.1); }
.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,87,108,0.4); }

.habits-list { margin-top: 20px; }
.habit-card {
  background: #fdf2f8;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 15px;
  border-left: 5px solid;
}
.habit-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
}
.habit-title { font-weight: 600; color: #831843; font-size: 16px; }
.habit-icon { font-size: 24px; }
.habit-stats {
  display: flex;
  gap: 20px;
  margin-bottom: 15px;
}
.stat-box {
  text-align: center;
  flex: 1;
}
.stat-value { font-size: 24px; font-weight: bold; color: #be185d; }
.stat-label { font-size: 11px; color: #f472b6; }
.week-tracker {
  display: flex;
  justify-content: space-between;
  gap: 5px;
}
.day-box {
  flex: 1;
  text-align: center;
}
.day-label { font-size: 10px; color: #9ca3af; margin-bottom: 5px; }
.day-check {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: #fce7f3;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 18px;
}
.day-check:hover { transform: scale(1.1); }
.day-check.completed { background: #f5576c; color: white; }
.day-check.future { opacity: 0.3; cursor: not-allowed; }

.delete-btn {
  background: #ef4444;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
}

.empty-state {
  text-align: center;
  padding: 40px;
  color: #f472b6;
}
.empty-state .icon { font-size: 48px; margin-bottom: 10px; }

.stats-section {
  background: #fdf2f8;
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}
.stats-section h3 { margin-bottom: 15px; color: #be185d; }
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.stat-card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}
.stat-card .value { font-size: 28px; font-weight: bold; color: #be185d; }
.stat-card .label { font-size: 12px; color: #f472b6; }
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="premium-badge">⭐ PREMIUM</div>
    <h1>🎯 Habit Tracker</h1>
    <div class="streak-display" id="totalStreak">0</div>
    <div class="streak-label">Total Days Tracked</div>
  </div>
  
  <div class="body">
    <div class="add-habit-section">
      <h3>Create New Habit</h3>
      <div class="input-group">
        <label>Habit Name</label>
        <input type="text" id="habitName" placeholder="e.g. Read 30 minutes">
      </div>
      <div class="input-group">
        <label>Icon</label>
        <select id="habitIcon">
          <option value="📚">📚 Reading</option>
          <option value="🏃">🏃 Running</option>
          <option value="💧">💧 Water</option>
          <option value="🧘">🧘 Meditation</option>
          <option value="💪">💪 Workout</option>
          <option value="🎸">🎸 Practice</option>
          <option value="🥗">🥗 Healthy Eating</option>
          <option value="😴">😴 Sleep Early</option>
          <option value="✍️">✍️ Journaling</option>
          <option value="💊">💊 Take Vitamins</option>
        </select>
      </div>
      <div class="input-group">
        <label>Color</label>
        <div class="color-picker" id="colorPicker">
          <div class="color-option selected" style="background:#f5576c" data-color="#f5576c"></div>
          <div class="color-option" style="background:#667eea" data-color="#667eea"></div>
          <div class="color-option" style="background:#11998e" data-color="#11998e"></div>
          <div class="color-option" style="background:#f093fb" data-color="#f093fb"></div>
          <div class="color-option" style="background:#f97316" data-color="#f97316"></div>
          <div class="color-option" style="background:#10b981" data-color="#10b981"></div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="addHabit()">Add Habit</button>
    </div>

    <div class="stats-section">
      <h3>📈 Your Stats</h3>
      <div class="stat-grid">
        <div class="stat-card">
          <div class="value" id="totalHabits">0</div>
          <div class="label">Active Habits</div>
        </div>
        <div class="stat-card">
          <div class="value" id="completionRate">0%</div>
          <div class="label">Completion Rate</div>
        </div>
        <div class="stat-card">
          <div class="value" id="bestStreak">0</div>
          <div class="label">Best Streak</div>
        </div>
        <div class="stat-card">
          <div class="value" id="totalChecks">0</div>
          <div class="label">Total Check-ins</div>
        </div>
      </div>
    </div>

    <div class="habits-list" id="habitsList">
      <div class="empty-state">
        <div class="icon">🎯</div>
        <p>No habits yet. Create your first one!</p>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
