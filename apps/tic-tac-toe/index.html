<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe Pro - Mini Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  min-height: 100vh;
  padding: 20px;
}
.app-container {
  max-width: 450px;
  margin: 0 auto;
}
.header {
  text-align: center;
  color: white;
  margin-bottom: 20px;
}
.header h1 { font-size: 28px; margin-bottom: 10px; }

.mode-selector {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}
.mode-btn {
  padding: 12px 24px;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  border-radius: 25px;
  cursor: pointer;
  transition: all 0.3s;
  font-size: 14px;
}
.mode-btn.active {
  background: white;
  color: #1e3c72;
  border-color: white;
}

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 20px;
}
.stat-box {
  background: rgba(255,255,255,0.15);
  padding: 15px 25px;
  border-radius: 16px;
  text-align: center;
  color: white;
  backdrop-filter: blur(10px);
}
.stat-box .value { font-size: 24px; font-weight: bold; }
.stat-box .label { font-size: 11px; opacity: 0.8; margin-top: 4px; }

.game-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 20px;
  margin-bottom: 20px;
}
.cell {
  aspect-ratio: 1;
  background: rgba(255,255,255,0.95);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  cursor: pointer;
  transition: all 0.3s;
  user-select: none;
}
.cell:hover:not(.taken) { 
  transform: scale(1.02);
  background: white;
  box-shadow: 0 5px 20px rgba(0,0,0,0.2);
}
.cell.taken { cursor: not-allowed; }
.cell.x { color: #3b82f6; }
.cell.o { color: #ef4444; }
.cell.winner {
  background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
  animation: winner-pulse 0.5s ease;
}

@keyframes winner-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

.status-bar {
  text-align: center;
  color: white;
  font-size: 18px;
  margin-bottom: 20px;
  padding: 15px;
  background: rgba(255,255,255,0.15);
  border-radius: 16px;
  backdrop-filter: blur(10px);
}
.status-bar .turn { font-weight: bold; }
.status-bar .turn.x { color: #60a5fa; }
.status-bar .turn.o { color: #f87171; }

.controls {
  display: flex;
  gap: 15px;
  justify-content: center;
}
.btn {
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: white;
  color: #1e3c72;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.btn-secondary {
  background: rgba(255,255,255,0.2);
  color: white;
  border: 2px solid rgba(255,255,255,0.3);
}

.difficulty-selector {
  text-align: center;
  margin-bottom: 15px;
}
.difficulty-selector label {
  color: rgba(255,255,255,0.7);
  margin-right: 10px;
  font-size: 14px;
}
.difficulty-selector select {
  padding: 8px 15px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.2);
  color: white;
  font-size: 14px;
}
.difficulty-selector option { color: #333; }

.history-section {
  background: rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
}
.history-section h3 { color: white; text-align: center; margin-bottom: 15px; }
.history-list { list-style: none; }
.history-list li {
  display: flex;
  justify-content: space-between;
  color: white;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.2);
  font-size: 14px;
}
.history-list li:last-child { border-bottom: none; }
.history-list .result { font-weight: bold; }
.history-list .result.win { color: #4ade80; }
.history-list .result.loss { color: #f87171; }
.history-list .result.draw { color: #fbbf24; }
.history-list .date { opacity: 0.6; font-size: 12px; }
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>⭕ Tic Tac Toe Pro</h1>
  </div>

  <div class="mode-selector">
    <button class="mode-btn active" onclick="setMode('ai')" id="btn-ai">🤖 vs AI</button>
    <button class="mode-btn" onclick="setMode('pvp')" id="btn-pvp">👥 2 Player</button>
  </div>

  <div class="difficulty-selector" id="difficultySelector">
    <label>AI Difficulty:</label>
    <select id="difficulty" onchange="setDifficulty()">
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>

  <div class="stats-bar">
    <div class="stat-box">
      <div class="value x" id="xWins">0</div>
      <div class="label">X Wins</div>
    </div>
    <div class="stat-box">
      <div class="value" id="draws">0</div>
      <div class="label">Draws</div>
    </div>
    <div class="stat-box">
      <div class="value o" id="oWins">0</div>
      <div class="label">O Wins</div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="turn x">X's Turn</span>
  </div>

  <div class="game-board" id="gameBoard">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="newGame()">New Game</button>
    <button class="btn btn-secondary" onclick="undoMove()" id="undoBtn">↩️ Undo</button>
  </div>

  <div class="history-section">
    <h3>📜 Game History</h3>
    <ul class="history-list" id="historyList">
      <li style="text-align:center;opacity:0.7;">No games played yet</li>
    </ul>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
