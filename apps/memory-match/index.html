<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match - Mini Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}
.app-container {
  max-width: 500px;
  margin: 0 auto;
}
.header {
  text-align: center;
  color: white;
  margin-bottom: 20px;
}
.header h1 { font-size: 28px; margin-bottom: 10px; }
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 30px;
  background: rgba(255,255,255,0.2);
  padding: 15px 30px;
  border-radius: 50px;
  backdrop-filter: blur(10px);
}
.stat { text-align: center; }
.stat .value { font-size: 24px; font-weight: bold; }
.stat .label { font-size: 12px; opacity: 0.8; }

.game-board {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}
.card {
  aspect-ratio: 1;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  border-radius: 16px;
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}
.card.flipped { transform: rotateY(180deg); }
.card.matched {
  background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%);
  pointer-events: none;
  animation: pulse 0.5s ease;
}
.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
}
.card-front {
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  font-size: 24px;
}
.card-front::after {
  content: '❓';
}
.card-back {
  background: white;
  transform: rotateY(180deg);
  font-size: 40px;
}

@keyframes pulse {
  0%, 100% { transform: rotateY(180deg) scale(1); }
  50% { transform: rotateY(180deg) scale(1.1); }
}

.controls {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: white;
  color: #764ba2;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.btn-secondary {
  background: rgba(255,255,255,0.2);
  color: white;
  border: 2px solid white;
}

.theme-selector {
  text-align: center;
  margin-bottom: 20px;
}
.theme-selector label {
  color: white;
  margin-right: 10px;
}
.theme-selector select {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: white;
  color: #764ba2;
  font-size: 14px;
}

.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.overlay.active { opacity: 1; pointer-events: all; }
.overlay-content {
  background: white;
  padding: 40px;
  border-radius: 24px;
  text-align: center;
  max-width: 350px;
}
.overlay-content h2 { 
  font-size: 32px; 
  margin-bottom: 20px; 
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.overlay-content p { color: #666; margin-bottom: 10px; }
.result-stats {
  background: #f3f4f6;
  padding: 20px;
  border-radius: 16px;
  margin: 20px 0;
}
.result-stats .stat-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}
.result-stats .stat-row:last-child { margin-bottom: 0; }

.leaderboard {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}
.leaderboard h3 { 
  color: white; 
  text-align: center; 
  margin-bottom: 15px; 
}
.score-list { list-style: none; }
.score-list li {
  display: flex;
  justify-content: space-between;
  color: white;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
.score-list li:last-child { border-bottom: none; }
.score-list .rank { color: #fbbf24; font-weight: bold; width: 30px; }
.score-list .time { opacity: 0.7; font-size: 12px; }

.timer-warning { color: #fbbf24 !important; animation: blink 1s infinite; }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>🧠 Memory Match</h1>
    <div class="stats-bar">
      <div class="stat">
        <div class="value" id="moves">0</div>
        <div class="label">Moves</div>
      </div>
      <div class="stat">
        <div class="value" id="timer">00:00</div>
        <div class="label">Time</div>
      </div>
      <div class="stat">
        <div class="value" id="pairs">0/8</div>
        <div class="label">Pairs</div>
      </div>
    </div>
  </div>

  <div class="theme-selector">
    <label>Theme:</label>
    <select id="themeSelect" onchange="changeTheme()">
      <option value="emoji">🎭 Emojis</option>
      <option value="animals">🐱 Animals</option>
      <option value="food">🍕 Food</option>
      <option value="sports">⚽ Sports</option>
    </select>
  </div>

  <div class="game-board" id="gameBoard"></div>

  <div class="controls">
    <button class="btn btn-primary" onclick="startGame()">New Game</button>
    <button class="btn btn-secondary" onclick="showLeaderboard()">🏆 Scores</button>
  </div>

  <div class="leaderboard" id="leaderboard">
    <h3>Best Times</h3>
    <ul class="score-list" id="scoreList"></ul>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="overlay-content">
    <h2>🎉 You Won!</h2>
    <p>Great memory skills!</p>
    <div class="result-stats">
      <div class="stat-row">
        <span>Moves:</span>
        <span id="resultMoves" style="font-weight:bold;color:#764ba2"></span>
      </div>
      <div class="stat-row">
        <span>Time:</span>
        <span id="resultTime" style="font-weight:bold;color:#764ba2"></span>
      </div>
      <div class="stat-row">
        <span>Rating:</span>
        <span id="resultRating" style="font-weight:bold;color:#f59e0b"></span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="startGame()">Play Again</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
