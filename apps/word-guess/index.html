<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Guess - Mini Game (Premium)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 100%);
  min-height: 100vh;
  padding: 20px;
}
.app-container {
  max-width: 450px;
  margin: 0 auto;
}
.header {
  text-align: center;
  color: white;
  margin-bottom: 20px;
  position: relative;
}
.premium-badge {
  position: absolute;
  top: 0;
  right: 0;
  background: linear-gradient(135deg, #ffd700 0%, #ffb700 100%);
  color: #333;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
}
.header h1 { font-size: 24px; margin-bottom: 10px; }
.header p { color: #a78bfa; font-size: 14px; }

.stats-bar {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
}
.stat-box {
  background: rgba(255,255,255,0.1);
  padding: 12px 20px;
  border-radius: 12px;
  text-align: center;
  color: white;
}
.stat-box .value { font-size: 20px; font-weight: bold; color: #a78bfa; }
.stat-box .label { font-size: 10px; opacity: 0.8; margin-top: 4px; }

.game-board {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}
.row {
  display: flex;
  gap: 8px;
  justify-content: center;
}
.tile {
  width: 56px;
  height: 56px;
  border: 2px solid #4c1d95;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
  text-transform: uppercase;
  color: white;
  background: rgba(76,29,149,0.3);
  transition: all 0.3s;
}
.tile.filled { border-color: #7c3aed; background: rgba(124,58,237,0.3); }
.tile.correct {
  background: #22c55e;
  border-color: #22c55e;
  animation: flip 0.5s ease;
}
.tile.present {
  background: #fbbf24;
  border-color: #fbbf24;
  color: #000;
  animation: flip 0.5s ease;
}
.tile.absent {
  background: #374151;
  border-color: #374151;
  animation: flip 0.5s ease;
}

@keyframes flip {
  0% { transform: rotateX(0); }
  50% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}

.keyboard {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.keyboard-row {
  display: flex;
  gap: 4px;
  justify-content: center;
}
.key {
  min-width: 32px;
  height: 48px;
  background: #4c1d95;
  border: none;
  border-radius: 6px;
  color: white;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.key:active { transform: scale(0.95); }
.key.wide { min-width: 50px; }
.key.enter { min-width: 65px; background: #7c3aed; }
.key.correct { background: #22c55e; }
.key.present { background: #fbbf24; color: #000; }
.key.absent { background: #374151; }

.message {
  text-align: center;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  font-weight: 600;
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.message.error { background: #ef4444; color: white; }
.message.success { background: #22c55e; color: white; }
.message.info { background: #3b82f6; color: white; }

.controls {
  display: flex;
  gap: 15px;
  justify-content: center;
  margin-top: 20px;
}
.btn {
  padding: 14px 28px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}
.btn-primary {
  background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
  color: white;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(139,92,246,0.4); }
.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 2px solid #7c3aed;
}

.streak-display {
  background: linear-gradient(135deg, #ffd700 0%, #ffb700 100%);
  color: #333;
  padding: 15px 25px;
  border-radius: 16px;
  text-align: center;
  margin-bottom: 20px;
}
.streak-display .streak-count { font-size: 36px; font-weight: bold; }
.streak-display .streak-label { font-size: 12px; font-weight: 600; }

.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.overlay.active { display: flex; }
.overlay-content {
  background: #2d1b4e;
  padding: 40px;
  border-radius: 24px;
  text-align: center;
  max-width: 350px;
  border: 2px solid #7c3aed;
}
.overlay-content h2 { color: #ffd700; font-size: 32px; margin-bottom: 20px; }
.overlay-content p { color: #a78bfa; margin-bottom: 20px; }
.word-reveal { 
  font-size: 28px; 
  color: white; 
  margin-bottom: 20px;
  letter-spacing: 4px;
  font-weight: bold;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin: 20px 0;
}
.stat-card {
  background: rgba(124,58,237,0.3);
  padding: 15px;
  border-radius: 12px;
}
.stat-card .val { font-size: 24px; color: #ffd700; font-weight: bold; }
.stat-card .lab { font-size: 12px; color: #a78bfa; }

.share-btn {
  background: #1da1f2;
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  margin-top: 15px;
}
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="premium-badge">⭐ PREMIUM</div>
    <h1>📝 Word Guess</h1>
    <p>Guess the 5-letter word in 6 tries</p>
  </div>

  <div class="streak-display">
    <div class="streak-count" id="streak">0</div>
    <div class="streak-label">🔥 Current Win Streak</div>
  </div>

  <div class="stats-bar">
    <div class="stat-box">
      <div class="value" id="gamesPlayed">0</div>
      <div class="label">Games</div>
    </div>
    <div class="stat-box">
      <div class="value" id="winRate">0%</div>
      <div class="label">Win Rate</div>
    </div>
    <div class="stat-box">
      <div class="value" id="bestStreak">0</div>
      <div class="label">Best Streak</div>
    </div>
  </div>

  <div class="message" id="message"></div>

  <div class="game-board" id="gameBoard"></div>

  <div class="keyboard" id="keyboard"></div>

  <div class="controls">
    <button class="btn btn-primary" onclick="newGame()">New Word</button>
    <button class="btn btn-secondary" onclick="showStats()">📊 Stats</button>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="overlay-content">
    <h2 id="resultTitle">🎉 You Won!</h2>
    <p id="resultMessage"></p>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="val" id="resultAttempts">0</div>
        <div class="lab">Attempts</div>
      </div>
      <div class="stat-card">
        <div class="val" id="resultStreak">0</div>
        <div class="lab">Streak</div>
      </div>
    </div>
    <button class="btn btn-primary" onclick="newGame()">Play Again</button>
    <br>
    <button class="share-btn" onclick="shareResult()">📤 Share Result</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
